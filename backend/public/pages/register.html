<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialPulse - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">

    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">SocialPulse</h1>
            <p class="text-gray-400 mt-2">Análisis de redes sociales</p>
        </div>

        <!-- Formulario -->
        <form action="/auth/register.php" method="POST">
            <div class="space-y-4">
                <div>
                    <label class="text-gray-300 text-sm">Email</label>
                    <input type="email" name="email"
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="Tu email">
                </div>
                <div>
                    <label class="text-gray-300 text-sm">Usuario</label>
                    <input type="text" name="username"
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="Tu usuario">
                </div>
                <div>
                    <label class="text-gray-300 text-sm">Contraseña</label>
                    <input type="password" name="password"
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="Tu contraseña">
                </div>
                <div>
                    <label class="text-gray-300 text-sm">Confirmar Contraseña</label>
                    <input type="password" name="confirm_password"
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
                           placeholder="Tu contraseña">
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-lg transition duration-200">
                    Crear cuenta
                </button>
            </div>
        </form>

        <!-- Enlace login -->
        <p class="text-center text-gray-400 mt-6 text-sm">
            ¿Ya tienes cuenta?
            <a href="login.html" class="text-blue-400 hover:underline">Inicia sesión</a>
        </p>

    </div>

</body>
</html>
